<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmers Marketplace - Bajar Bhav</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <img src="Agrotes logo.png" alt="Logo" class="main-logo">
        <h1>બજાર ભાવ</h1>
        <nav>
            <button id="farmer-btn">હું ખેડૂત છું</button>
            <button id="buyer-btn">હું વેપારી છું</button>
        </nav>
    </header>
    
    <main>
        <div class="selection-box">
            <label id="farmer-stuff" style="display: none;"><h3>ઉત્પાદન પસંદ કરો:</h3></label>
            <select id="product-category" class="main-select" style="display: none;" required>
                <option value="" disabled selected>-- શ્રેણી પસંદ કરો --</option>
                <option value="Cereals">અનાજ</option>
                <option value="Oilseeds">તેલબીજ</option>
                <option value="Pulses">કઠોળ</option>
                <option value="Vegetables">શાકભાજી</option>
                <option value="Spices">મસાલા</option>
                <option value="Fruits">ફળ</option>
            </select>

            <label id="selected-category-label" style="display: none;">પાક પસંદ કરો:</label>
            <select id="selected-category" class="sub-select" style="display: none;"></select>

            <button id="submit-btn" class="submit-btn" style="display: none;">ભાવ તપાસો</button>
        </div>

        <section id="price-results" class="price-section" style="display: none;">
            <h2>આજના તાજા ભાવ (ગુજરાત)</h2>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>માર્કેટ યાર્ડ</th>
                            <th>ઓછામાં ઓછો</th>
                            <th>વધારેમાં વધારે</th>
                            <th>સરેરાશ ભાવ</th>
                        </tr>
                    </thead>
                    <tbody id="price-body"></tbody>
                </table>
            </div>
        </section>
    </main>

    <footer><p>Contact us at support@farmmarket.com</p></footer>
    <script src="work.js"></script>
</body>
</html>
