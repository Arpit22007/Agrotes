<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmers & Buyers Marketplace</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <script src="work.js"></script>
    <header>
        <h1>બજાર ભાવ</h1>
        <nav>
            <button id="farmer-btn">હું ખેડૂત છું</button>
            <button id="buyer-btn">હું વેપારી છું</button>
        </nav>
    </header>
    
    <main>
        <label id = "farmer-stuff",style = "display:none;"><h3> ઉત્પાદન પસંદ કરો: </h3></label>
        <select id="product-category", style="height: 50px; width: 100px; display: none;">
                <option value="">-- પસંદ કરો --</option>
                <option value="fruits">ફળો</option>
                <option value="vegetables">શાકભાજી</option>
                <option value="grains">ધાન્ય</option>
                <option value="dairy">ડેરી</option>
        </select>


        
        <section id="add-product-section" style="display: none;">
            <h2>Add Your Product</h2>
            <form id="add-product-form">
                <label for="product-name">Product Name:</label>
                <input type="text" id="product-name" required>
                
                <label for="product-price">Price per kg:</label>
                <input type="number" id="product-price" required>
                
                <label for="product-quantity">Quantity (kg):</label>
                <input type="number" id="product-quantity" required>
                
                <button type="submit">Add Product</button>
            </form>
        </section>
    </main>
    
    <footer>
        <p>Contact us at support@farmmarket.com</p>
    </footer>
    
    <script src="script.js"></script>
</body>
</html>
