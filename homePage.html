<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmers & Buyers Marketplace</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <script src="work.js"></script>
    <header>
        <h1>બજાર ભાવ</h1>
        <nav>
            <button id="farmer-btn">હું ખેડૂત છું</button>
            <button id="buyer-btn">હું વેપારી છું</button>
        </nav>
    </header>
    
    <main>
        <label id = "farmer-stuff" style="display: none;"><h3> ઉત્પાદન પસંદ કરો: </h3></label>
        <select id="product-category", style="height: 50px; width: 300px; display: none;", required>
                <option value="", disabled="name", selected="true">-- પસંદ કરો --</option>
                <option value="Cereals" ,id="selected-product">અનાજ પાક</option>
                <option value="Oilseeds" , id="selected-product">તેલબીજ પાક</option>
                <option value="Pulses" , id="selected-product">કઠોળ / દાળ પાક</option>
                <option value="Vegetables" , id="selected-product">શાકભાજી પાક</option>
                <option value="Spices" , id="selected-product">મસાલા પાક</option>
                <option value="Fruits" , id="selected-product">ફળ પાક</option>
                <option value="Cash Crops" , id="selected-product">નગદ પાક / ઉદ્યોગ પાક</option>
                <option value="Fodder Crops", id="selected-product">ચારો</option>
        </select>

        <br><br>
        <label id="selected-category-label" style="display: none;">પસંદ કરો:</label>
        <select name="" id="selected-category", style="display: none; height: 30px; width: 150px;">

        </select>
    </main>
    
    <footer>
        <p>Contact us at support@farmmarket.com</p>
    </footer>
    
    <script src="script.js"></script>
</body>
</html>
